name: Flutter CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./flutterapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6' 
          channel: 'stable'
          cache: true 

      - name: instala dependencias
        run: flutter pub get

      - name: analisa código
        run: flutter analyze

      - name: roda testes
        run: flutter test

      - name: build apk
        run: flutter build apk --debug

      - name: verificar formatação
        run: dart format --output=set-exit-code .